# ============================================================
# APPLICATION CONFIGURATION
# ============================================================

# Application name
spring.application.name=dataset-api
server.port=8080

# ============================================================
# H2 IN-MEMORY DATABASE CONFIGURATION
# H2 is a lightweight database that runs inside your app.
# No external DB setup needed for development/testing.
# ============================================================
spring.datasource.url=jdbc:h2:mem:datasetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# JPA = Java Persistence API (standard for DB operations)
# Hibernate = JPA implementation used by Spring Boot by default
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop = creates tables on startup, drops on shutdown
# This is fine for development. Use 'validate' in production.
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL queries in console (helpful while learning!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 CONSOLE (Web UI to inspect your database)
# Visit: http://localhost:8080/h2-console while app is running
# JDBC URL: jdbc:h2:mem:datasetdb
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# SWAGGER / OPENAPI DOCUMENTATION
# Visit: http://localhost:8080/swagger-ui.html
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# LOGGING
# ============================================================
logging.level.com.assignment.datasetapi=DEBUG
logging.level.org.hibernate.SQL=DEBUG
